<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1425 900" role="img" aria-labelledby="title desc">
  <title id="title">StockPilot medical inventory prototype preview</title>
  <desc id="desc">A medical inventory, purchase and reporting automation admin dashboard preview.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f3f8fb"/>
      <stop offset="1" stop-color="#eef7f4"/>
    </linearGradient>
    <linearGradient id="side" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#0f3443"/>
      <stop offset="1" stop-color="#10202d"/>
    </linearGradient>
    <linearGradient id="teal" x1="0" x2="1">
      <stop offset="0" stop-color="#0aa39a"/>
      <stop offset="1" stop-color="#235a7d"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="20" stdDeviation="20" flood-color="#0f3443" flood-opacity=".14"/>
    </filter>
  </defs>
  <rect width="1425" height="900" rx="28" fill="url(#bg)"/>
