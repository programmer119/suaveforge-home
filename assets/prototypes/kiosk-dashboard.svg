<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1425 900" role="img" aria-labelledby="title desc">
  <title id="title">Android vending kiosk prototype preview</title>
  <desc id="desc">An Android vending kiosk recommendation and dispense flow dashboard preview.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#eef5f8"/>
      <stop offset="1" stop-color="#f8fbfc"/>
    </linearGradient>
    <linearGradient id="side" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#233341"/>
      <stop offset="1" stop-color="#172431"/>
    </linearGradient>
    <linearGradient id="snack" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f7df6d"/>
      <stop offset=".55" stop-color="#f4ef9a"/>
      <stop offset=".56" stop-color="#178f70"/>
      <stop offset="1" stop-color="#22b78f"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="20" stdDeviation="20" flood-color="#20303d" flood-opacity=".14"/>
    </filter>
  </defs>
  <rect width="1425" height="900" rx="28" fill="url(#bg)"/>
  <g transform="translate(54 54)" filter="url(#shadow)">
    <rect width="1317" height="792" rx="26" fill="#f8fbfc"/>
    <g font-family="Inter, Arial, sans-serif">
      <text x="34" y="52" font-size="15" font-weight="900" fill="#0a8f7a">ANDROID VENDING KIOSK</text>
      <text x="34" y="102" font-size="42" font-weight="900" fill="#172431">AI 맞춤 추천 무인 자판기</text>
      <rect x="946" y="44" width="96" height="42" rx="21" fill="#0a8f7a"/>
      <text x="994" y="72" text-anchor="middle" font-size="15" font-weight="900" fill="#ffffff">키오스크</text>
      <rect x="1060" y="44" width="112" height="42" rx="21" fill="#eef5f8"/>
      <text x="1116" y="72" text-anchor="middle" font-size="15" font-weight="900" fill="#556a75">관리자 콘솔</text>
      <rect x="1190" y="44" width="92" height="42" rx="21" fill="#e8fbf6"/>
      <text x="1236" y="72" text-anchor="middle" font-size="15" font-weight="900" fill="#0a8f7a">EN</text>
    </g>
    <g transform="translate(34 134)">
      <rect width="276" height="610" rx="22" fill="url(#side)"/>
      <g font-family="Inter, Arial, sans-serif">
        <text x="40" y="58" font-size="15" font-weight="900" fill="#aebcc6">사용자 흐름</text>
        <g font-size="17" font-weight="900" fill="#ffffff">
          <text x="42" y="112">1. 상태 선택</text>
          <text x="42" y="166">2. AI 추천 결과</text>
          <text x="42" y="220">3. 사용자 확인</text>
          <text x="42" y="274">4. 제품 토출</text>
          <text x="42" y="328">5. 로그 저장</text>
        </g>
        <circle cx="46" cy="398" r="7" fill="#27d17f"/>
        <text x="64" y="404" font-size="15" font-weight="800" fill="#cfd9df">Android 태블릿 연결됨</text>
        <circle cx="46" cy="438" r="7" fill="#f6b82f"/>
        <text x="64" y="444" font-size="15" font-weight="800" fill="#cfd9df">토출 모듈 대기 중</text>
        <rect x="34" y="482" width="208" height="92" rx="14" fill="#203342" stroke="#334656"/>
        <text x="58" y="514" font-size="14" font-weight="900" fill="#ffffff">Android Kiosk Mode</text>
        <text x="58" y="542" font-size="13" font-weight="800" fill="#aebcc6">앱 단독 실행 · 화면 꺼짐 방지</text>
      </g>
    </g>
    <g transform="translate(350 134)" font-family="Inter, Arial, sans-serif">
      <rect width="650" height="610" rx="22" fill="#ffffff" stroke="#dce7ec"/>
      <text x="44" y="64" font-size="15" font-weight="900" fill="#0a8f7a">STEP 01</text>
      <text x="44" y="116" font-size="36" font-weight="900" fill="#172431">상태를 선택하면 추천 상품이 즉시 바뀝니다</text>
      <text x="44" y="154" font-size="18" font-weight="700" fill="#70818b">선택값을 추천 엔진 입력값으로 보고 상품 ID, 슬롯, 카트리지 정보를 갱신합니다.</text>
      <rect x="506" y="62" width="104" height="76" rx="14" fill="#f7fafb" stroke="#dce7ec"/>
      <text x="528" y="91" font-size="13" font-weight="900" fill="#70818b">기기</text>
      <text x="528" y="120" font-size="22" font-weight="900" fill="#172431">VND-A01</text>
      <g transform="translate(44 196)" font-size="17" font-weight="900">
        <rect width="136" height="70" rx="14" fill="#ffffff" stroke="#ccd9df"/>
        <text x="68" y="44" text-anchor="middle" fill="#172431">피로감 높음</text>
        <rect x="154" width="136" height="70" rx="14" fill="#ffffff" stroke="#ccd9df"/>
        <text x="222" y="44" text-anchor="middle" fill="#172431">집중 필요</text>
        <rect x="308" width="136" height="70" rx="14" fill="#ffffff" stroke="#ccd9df"/>
        <text x="376" y="44" text-anchor="middle" fill="#172431">수분 보충</text>
        <rect x="462" width="136" height="70" rx="14" fill="#e8fbf6" stroke="#0a8f7a" stroke-width="3"/>
        <text x="530" y="44" text-anchor="middle" fill="#172431">가벼운 간식</text>
      </g>
      <rect x="44" y="300" width="564" height="244" rx="18" fill="#f7fafb" stroke="#dce7ec"/>
      <rect x="76" y="348" width="154" height="154" rx="22" fill="#fbf5d7"/>
      <rect x="112" y="382" width="82" height="82" rx="18" fill="url(#snack)"/>
      <text x="274" y="348" font-size="15" font-weight="900" fill="#70818b">AI 추천 결과 JSON</text>
      <text x="274" y="392" font-size="30" font-weight="900" fill="#172431">비타민 에너지 드링크</text>
      <text x="274" y="426" font-size="16" font-weight="800" fill="#70818b">추천 상품 ID SKU-ENERGY-02, 슬롯 A-03, 카트리지 2번</text>
      <rect x="274" y="454" width="292" height="66" rx="12" fill="#0f3029"/>
      <text x="296" y="486" font-size="15" font-weight="800" fill="#d7fff4">{ "slot": "A-03", "quantity": 1 }</text>
    </g>
    <g transform="translate(1030 134)" font-family="Inter, Arial, sans-serif">
      <rect width="276" height="610" rx="22" fill="#ffffff" stroke="#dce7ec"/>
      <text x="34" y="52" font-size="20" font-weight="900" fill="#172431">관리 로그</text>
      <text x="34" y="92" font-size="15" font-weight="800" fill="#70818b">Google Sheet 기록 대기</text>
      <rect x="34" y="484" width="208" height="72" rx="14" fill="#f7fafb" stroke="#dce7ec"/>
      <text x="58" y="516" font-size="14" font-weight="900" fill="#0a8f7a">토출 로그</text>
      <text x="58" y="540" font-size="13" font-weight="800" fill="#70818b">관리 페이지에서 확인 가능</text>
    </g>
  </g>
</svg>
