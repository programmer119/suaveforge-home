<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1425 900" role="img" aria-labelledby="title desc">
  <title id="title">PatentOps SaaS prototype preview</title>
  <desc id="desc">A patent administration automation SaaS dashboard prototype preview.</desc>
  <defs>
