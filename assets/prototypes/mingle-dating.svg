<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1425 900" role="img" aria-labelledby="title desc">
  <title id="title">Mingle Flutter dating app prototype preview</title>
  <desc id="desc">A Flutter dating and matching app prototype preview.</desc>
  <defs>
